name: FlowTrader — Trading Bot

on:
  # ── Scheduled runs during US market hours ────────────────────────────────
  schedule:
    # Every 30 minutes on weekdays, 09:30 to 14:30 EST
    # GitHub Actions uses UTC. EST = UTC-5, EDT = UTC-4.
    # These times cover 09:30–14:30 EST during EDT (UTC-4):
    - cron: '30 13 * * 1-5'   # 09:30 EST (EDT: 13:30 UTC)
    - cron: '0 14 * * 1-5'    # 10:00 EST
    - cron: '30 14 * * 1-5'   # 10:30 EST
    - cron: '0 15 * * 1-5'    # 11:00 EST
    - cron: '30 15 * * 1-5'   # 11:30 EST
    - cron: '0 16 * * 1-5'    # 12:00 EST
    - cron: '30 16 * * 1-5'   # 12:30 EST
    - cron: '0 17 * * 1-5'    # 13:00 EST
    - cron: '30 17 * * 1-5'   # 13:30 EST
    - cron: '0 18 * * 1-5'    # 14:00 EST
    - cron: '30 18 * * 1-5'   # 14:30 EST (last scan before time gate)

    # ── Weekly review — every Sunday at 08:00 EST ──────────────────────────
    - cron: '0 12 * * 0'      # Sunday 08:00 EST = 12:00 UTC

    # ── Research Analyst — Sunday 18:00 EDT (22:00 UTC) ──────────────────
    - cron: '0 22 * * 0'      # Sunday 18:00 EDT = 22:00 UTC

    # ── Daily analyst run — 17:30 EST (21:30 UTC) weekdays ────────────────
    - cron: '30 21 * * 1-5'   # 17:30 EST = 21:30 UTC


  # ── Manual trigger (for testing) ─────────────────────────────────────────
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - test
          - weekly-review
          - research-analyst
          - analyst-in
          - analyst-out
          - analyst-full

jobs:
  trade:
    name: Trading Session
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Create required directories ───────────────────────────────────
      - name: Create directories
        run: |
          mkdir -p journal

      # ── 5. Restore journal from cache ────────────────────────────────────
      # This preserves journal entries between GitHub Actions runs
      - name: Restore journal cache
        uses: actions/cache@v4
        with:
          path: journal/
          key: journal-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            journal-${{ runner.os }}-

      # ── 6. Fetch active risk profile from dashboard repo ─────────────────
      # risk_profile.json lives in flowtrader-dashboard and is written by
      # the Streamlit dashboard when the user switches profiles. Download it
      # into journal/ so the bot reads the correct profile on this run.
      - name: Fetch active risk profile
        env:
          DASHBOARD_READ_TOKEN: ${{ secrets.DASHBOARD_READ_TOKEN }}
        run: |
          mkdir -p journal
          curl -sf \
            -H "Authorization: token $DASHBOARD_READ_TOKEN" \
            "https://raw.githubusercontent.com/qlategan-stack/flowtrader-dashboard/main/journal/risk_profile.json" \
            -o journal/risk_profile.json \
          && echo "Risk profile downloaded: $(cat journal/risk_profile.json)" \
          || echo "Could not fetch risk_profile.json — using cached or default"

      # ── 7. Run the trading bot ────────────────────────────────────────────
      - name: Run FlowTrader
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          PAPER_TRADING: ${{ secrets.PAPER_TRADING || 'true' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LIVE_TRADING_CONFIRMED: ${{ secrets.LIVE_TRADING_CONFIRMED || 'false' }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"

          # Detect Sunday cron runs by UTC hour
          DAY=$(date +%u)   # 1=Monday … 7=Sunday
          HOUR=$(date +%H)  # UTC
          if [ "$DAY" = "7" ] && [ "$HOUR" = "12" ]; then
            MODE="weekly-review"
          fi
          if [ "$DAY" = "7" ] && [ "$HOUR" = "22" ]; then
            MODE="research-analyst"
          fi

          echo "Running FlowTrader in mode: $MODE"
          python main.py $MODE

      # ── 8. Fetch Bybit balance snapshot ─────────────────────────────────
      # GitHub Actions has unrestricted internet — no geo-blocking.
      # Writes journal/bybit_balance.json so the dashboard can read it
      # without ever calling the Bybit API directly from Streamlit Cloud.
      - name: Fetch Bybit balance snapshot
        env:
          BYBIT_API_KEY: ${{ secrets.BYBIT_API_KEY }}
          BYBIT_SECRET_KEY: ${{ secrets.BYBIT_SECRET_KEY }}
          BYBIT_TESTNET: ${{ secrets.BYBIT_TESTNET || 'true' }}
        run: |
          python - <<'EOF'
          import sys, json
          from pathlib import Path
          from datetime import datetime, timezone
          sys.path.insert(0, '.')
          try:
              from data.crypto_fetcher import BybitFetcher
              b = BybitFetcher()
              bal = b.get_balance()
          except Exception as e:
              bal = {"error": str(e)}
          bal["fetched_at"] = datetime.now(timezone.utc).isoformat()
          Path("journal/bybit_balance.json").write_text(json.dumps(bal, indent=2))
          print("Bybit balance snapshot:", bal)
          EOF

      # ── 9. Save journal and logs as artifacts ────────────────────────────
      - name: Upload journal artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trading-journal-${{ github.run_id }}
          path: |
            journal/trades.jsonl
            journal/bot.log
            journal/weekly_summary.md
            journal/weekly_research_memo.md
            journal/weekly_research_memo.json
            journal/bybit_balance.json
          retention-days: 90  # Keep 90 days of history

      # ── 10. Save updated journal to cache ────────────────────────────────
      - name: Save journal to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: journal/
          key: journal-${{ runner.os }}-${{ github.run_id }}

  analyst:
    name: Daily Analyst Review
    runs-on: ubuntu-latest
    # Only run on the 17:30 EST cron, not the trading-hours crons
    if: >-
      (github.event_name == 'schedule' && contains(github.event.schedule, '30 21')) ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.mode == 'analyst-in' ||
        github.event.inputs.mode == 'analyst-out' ||
        github.event.inputs.mode == 'analyst-full'
      ))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p journal

      # This job reads trades.jsonl (written by the trade job) but does NOT
      # modify it. The cache save below only adds suggestion files.
      - name: Restore journal cache
        uses: actions/cache@v4
        with:
          path: journal/
          key: journal-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            journal-${{ runner.os }}-

      - name: Run analyst
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MODE="${{ github.event.inputs.mode || 'analyst-full' }}"
          echo "Running analyst in mode: $MODE"
          python main.py $MODE

      - name: Upload suggestion artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analyst-suggestions-${{ github.run_id }}
          path: |
            journal/suggestions_in.jsonl
            journal/suggestions_out.jsonl
          retention-days: 90

      - name: Save updated journal to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: journal/
          key: journal-${{ runner.os }}-${{ github.run_id }}
