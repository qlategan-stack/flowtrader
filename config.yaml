# config.yaml — FlowTrader Configuration
# Edit this file to adjust your watchlist, risk settings, and API endpoints

# ── TRADING MODE ──────────────────────────────────────────
paper_trading: true          # ALWAYS start on paper. Change to false only after 90 days.
live_trading_confirmed: false # Second safety flag — both must be false for paper mode

# ── EMERGENCY STOP ────────────────────────────────────────
# Only `risk.max_open_positions` is read at runtime from this block.
# Setting it to 0 is a HARD KILL-SWITCH — refuses all new entries regardless of
# the active profile in journal/risk_profile.json. Exits still execute so an
# operator can flatten positions while the bot keeps running for data/dashboard.
# Set to any positive integer (or delete the field) to resume normal operation,
# at which point the active profile's max_open_positions governs.
# All other risk parameters (position_pct, daily_loss, signal_score, R:R) come
# from the active profile in `risk_profiles` below — fields here are ignored.
risk:
  max_open_positions: 5      # set to 0 to engage the emergency stop (halts new entries)

# ── RISK PROFILES ─────────────────────────────────────────
# Active profile is read from risk_profile.json. The executor searches:
#   1. trading-bot/trading-bot/journal/risk_profile.json   (CI / GitHub Actions)
#   2. flowtrader-dashboard/journal/risk_profile.json      (local dev / dashboard)
# whichever exists first. high_safety is the fallback if neither is found
# (executor logs an ERROR in that case so the gap is visible).
risk_profiles:
  high_safety:
    max_open_positions: 3
    max_daily_loss_pct: 0.02    # 2% — stop trading for the day
    max_position_pct: 0.10      # 10% of account per order
    risk_pct_per_trade: 0.01    # 1% account risk per trade
    min_signal_score: 3         # crypto threshold (3+ of 6 signals)
    equity_min_signal_score: 2  # equity threshold — 1 lower than crypto (M-1 audit 2026-05-26 experiment)
    max_stop_distance_pct: 0.05 # stop no more than 5% from entry
    min_order_value: 100        # minimum $100 order

  medium_safety:
    max_open_positions: 7       # 2026-05-28: raised 5→7 to admit the crypto sleeve.
                                # Previously the cap was 5 equity-only and the 2 Binance
                                # crypto positions weren't counted, causing the 5↔7
                                # oscillation the [H-1] audit flagged. 7 = 5 equity + 2 crypto.
    max_daily_loss_pct: 0.04    # 4% — wider daily loss tolerance
    max_position_pct: 0.10      # 10% of account per order (hard ceiling)
    risk_pct_per_trade: 0.015   # 1.5% account risk per trade
    min_signal_score: 2         # crypto threshold (2+ of 6 signals)
    equity_min_signal_score: 1  # equity threshold — 1 lower than crypto (M-1 audit 2026-05-26 experiment)
    max_stop_distance_pct: 0.08 # stop up to 8% from entry
    min_order_value: 50         # minimum $50 order

  low_safety:
    max_open_positions: 8
    max_daily_loss_pct: 0.06    # 6% — aggressive daily loss tolerance
    max_position_pct: 0.05      # 5% of account per order
    risk_pct_per_trade: 0.02    # 2% account risk per trade
    min_signal_score: 1         # crypto threshold (any single signal)
    equity_min_signal_score: 1  # equity = crypto at this profile (already at floor)
    max_stop_distance_pct: 0.12 # stop up to 12% from entry
    min_order_value: 25         # minimum $25 order
    always_max_position: true   # always size at max_position_pct — no risk-per-share calc

# ── STRATEGY SETTINGS ─────────────────────────────────────
strategy:
  rsi_period: 14
  rsi_oversold: 32            # RSI below this = oversold signal
  rsi_overbought: 68          # RSI above this = overbought (for shorts later)
  bollinger_period: 20
  bollinger_std: 2.0
  adx_period: 14
  adx_trend_threshold: 25     # ADX above this = trending, skip mean reversion
  adx_range_threshold: 20     # ADX below this = ranging, good for mean reversion
  vwap_deviation_pct: 1.0     # % below VWAP required for signal
  atr_period: 14
  atr_stop_multiplier: 0.5    # Stop = entry - (0.5 x ATR)
  atr_trail_multiplier: 0.25  # Trail stop after partial exit

# ── WATCHLIST ─────────────────────────────────────────────
watchlist:
  equities:
    # Tech
    - NVDA    # NVIDIA — high volume, good mean reversion
    - AAPL    # Apple — liquid, tight spreads
    - MSFT    # Microsoft — stable, strong mean reversion
    - AMD     # AMD — correlated with NVDA, pairs opportunities
    - TSLA    # Tesla — high beta, strong mean reversion swings
    - META    # Meta — liquid mega-cap, vol good for signals
    # Broad market ETFs
    - SPY     # S&P 500 ETF — primary benchmark
    - QQQ     # Nasdaq ETF — market regime reading
    - IWM     # Russell 2000 ETF — small-cap divergence signal
    # Commodities & non-correlated
    - GLD     # Gold ETF — macro hedge, non-correlated
    - SLV     # Silver ETF — higher beta version of gold
    - USO     # Oil ETF (WTI crude) — commodity mean reversion
    - TLT     # 20+ Year Treasury Bond ETF — rate & risk-off signal

  crypto:
    - BTC/USDT    # Bitcoin — regime setter, deepest liquidity
    - ETH/USDT    # Ethereum — second most liquid
    - XRP/USDT    # Ripple — top-5 cap, ranges cleanly between levels
    - LTC/USDT    # Litecoin — historically cleanest BTC-lagging MR pair
    - SOL/USDT    # Solana — alt-L1, high volatility
    - ADA/USDT    # Cardano — wide predictable ranging channels
    - DOT/USDT    # Polkadot — interop chain, low persistent trend
    - LINK/USDT   # Chainlink — oracle token, technical patterns
    - NEAR/USDT   # NEAR Protocol — L1 diversification from SOL

# ── SCHEDULE ──────────────────────────────────────────────
schedule:
  market_open_buffer_minutes: 15   # Don't trade first 15 min after equity open (volatile)
  research_interval_minutes: 30    # How often to rescan the watchlist

  # ── 12-HOUR TRADING WINDOW ─────────────────────────────
  # Both equities AND crypto are gated to this window.
  # New entries are blocked outside window_start / window_entry_cutoff.
  # Existing bracket orders (stop-loss / take-profit) remain live on the
  # exchange 24/7 regardless of this gate — the broker manages them.
  #
  # Window: 08:00–20:00 EST  (12 h)
  #   • Covers pre-US-market (08:00–09:30), full equity session,
  #     and peak US/EU crypto liquidity through evening.
  #   • Entry cutoff 19:45 (15 min before window end) so no new position
  #     is opened in the last few minutes.
  #   • 20:00–08:00 EST is the off-window: no new entries, bot idles.
  #
  # Change these two values to shift the window without touching code.
  window_start_hour: 8       # 08:00 EST — window opens
  window_start_minute: 0
  window_end_hour: 20        # 20:00 EST — window closes (soft: entries only)
  window_end_minute: 0
  window_entry_cutoff_minutes: 15  # Stop new entries N min before window end

  crypto_24_7: false         # Crypto now respects the 12-h window (not 24/7)

# ── API ENDPOINTS ─────────────────────────────────────────
alpaca:
  paper_base_url: "https://paper-api.alpaca.markets"
  live_base_url: "https://api.alpaca.markets"
  data_base_url: "https://data.alpaca.markets"

# ── NOTIFICATIONS ─────────────────────────────────────────
notifications:
  telegram_enabled: true  # Set TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID in .env
  daily_summary: true     # Send end-of-day P&L summary
  trade_alerts: true      # Alert on every trade placed
